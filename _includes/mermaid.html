<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      darkMode: false,
      background: '#ffffff',
      primaryColor: '#f5f5f7',
      primaryTextColor: '#1d1d1f',
      primaryBorderColor: '#d2d2d7',
      secondaryColor: '#fbfbfd',
      secondaryTextColor: '#1d1d1f',
      secondaryBorderColor: '#d2d2d7',
      tertiaryColor: '#f5f5f7',
      tertiaryTextColor: '#1d1d1f',
      tertiaryBorderColor: '#d2d2d7',
      lineColor: '#86868b',
      textColor: '#1d1d1f',
      mainBkg: '#f5f5f7',
      nodeBorder: '#d2d2d7',
      clusterBkg: '#fbfbfd',
      clusterBorder: '#d2d2d7',
      titleColor: '#1d1d1f',
      edgeLabelBackground: '#ffffff',
      nodeTextColor: '#1d1d1f',

      /* Sequence diagram */
      actorBkg: '#f5f5f7',
      actorBorder: '#d2d2d7',
      actorTextColor: '#1d1d1f',
      actorLineColor: '#86868b',
      signalColor: '#1d1d1f',
      signalTextColor: '#1d1d1f',
      sequenceNumberColor: '#ffffff',
      labelBoxBkgColor: '#f5f5f7',
      labelBoxBorderColor: '#d2d2d7',
      labelTextColor: '#1d1d1f',
      loopTextColor: '#1d1d1f',
      activationBorderColor: '#d2d2d7',
      activationBkgColor: '#f5f5f7',

      /* Notes */
      noteBkgColor: '#f5f5f7',
      noteTextColor: '#1d1d1f',
      noteBorderColor: '#d2d2d7',
    }
  });

  document.querySelectorAll('pre code.language-mermaid').forEach(function (el) {
    var container = document.createElement('div');
    container.className = 'mermaid';
    container.textContent = el.textContent;
    el.closest('pre').replaceWith(container);
  });

  mermaid.run();
</script>
