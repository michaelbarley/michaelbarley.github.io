<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      darkMode: false,
      background: '#f9f5d7',
      primaryColor: '#ebdbb2',
      primaryTextColor: '#3c3836',
      primaryBorderColor: '#d5c4a1',
      secondaryColor: '#f2e5bc',
      secondaryTextColor: '#3c3836',
      secondaryBorderColor: '#bdae93',
      tertiaryColor: '#fbf1c7',
      tertiaryTextColor: '#3c3836',
      tertiaryBorderColor: '#d5c4a1',
      lineColor: '#7c6f64',
      textColor: '#3c3836',
      mainBkg: '#ebdbb2',
      nodeBorder: '#d5c4a1',
      clusterBkg: '#fbf1c7',
      clusterBorder: '#d5c4a1',
      titleColor: '#282828',
      edgeLabelBackground: '#f9f5d7',
      nodeTextColor: '#3c3836',

      /* Sequence diagram */
      actorBkg: '#ebdbb2',
      actorBorder: '#d5c4a1',
      actorTextColor: '#3c3836',
      actorLineColor: '#7c6f64',
      signalColor: '#3c3836',
      signalTextColor: '#3c3836',
      sequenceNumberColor: '#f9f5d7',
      labelBoxBkgColor: '#ebdbb2',
      labelBoxBorderColor: '#d5c4a1',
      labelTextColor: '#3c3836',
      loopTextColor: '#3c3836',
      activationBorderColor: '#d5c4a1',
      activationBkgColor: '#ebdbb2',

      /* Notes */
      noteBkgColor: '#f2e5bc',
      noteTextColor: '#3c3836',
      noteBorderColor: '#bdae93',
    }
  });

  document.querySelectorAll('pre code.language-mermaid').forEach(function (el) {
    var container = document.createElement('div');
    container.className = 'mermaid';
    container.textContent = el.textContent;
    el.closest('pre').replaceWith(container);
  });

  mermaid.run();
</script>
