<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      darkMode: true,
      background: '#0d1117',
      primaryColor: '#161b22',
      primaryTextColor: '#c9d1d9',
      primaryBorderColor: '#30363d',
      secondaryColor: '#1c2333',
      secondaryTextColor: '#c9d1d9',
      secondaryBorderColor: '#30363d',
      tertiaryColor: '#161b22',
      tertiaryTextColor: '#c9d1d9',
      tertiaryBorderColor: '#30363d',
      lineColor: '#6e7681',
      textColor: '#c9d1d9',
      mainBkg: '#161b22',
      nodeBorder: '#30363d',
      clusterBkg: '#1c2333',
      clusterBorder: '#30363d',
      titleColor: '#e6edf3',
      edgeLabelBackground: '#0d1117',
      nodeTextColor: '#c9d1d9',

      /* Sequence diagram */
      actorBkg: '#161b22',
      actorBorder: '#30363d',
      actorTextColor: '#c9d1d9',
      actorLineColor: '#6e7681',
      signalColor: '#c9d1d9',
      signalTextColor: '#c9d1d9',
      sequenceNumberColor: '#0d1117',
      labelBoxBkgColor: '#161b22',
      labelBoxBorderColor: '#30363d',
      labelTextColor: '#c9d1d9',
      loopTextColor: '#c9d1d9',
      activationBorderColor: '#50fa7b',
      activationBkgColor: '#1c2333',

      /* Notes */
      noteBkgColor: '#1c2333',
      noteTextColor: '#c9d1d9',
      noteBorderColor: '#50fa7b',
    }
  });

  document.querySelectorAll('pre code.language-mermaid').forEach(function (el) {
    var container = document.createElement('div');
    container.className = 'mermaid';
    container.textContent = el.textContent;
    el.closest('pre').replaceWith(container);
  });

  mermaid.run();
</script>
