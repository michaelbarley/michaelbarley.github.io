# ============================================================
# Theme Configuration — Linux Terminal
# Dark backgrounds, phosphor green accent, monospace aesthetic
# Terminal-inspired UI with CRT effects and green glow
# ============================================================

# --- Backgrounds -------------------------------------------
colors:
  bg: "#0d1117"                  # Deep dark (terminal background)
  bg_subtle: "#161b22"          # Slightly lighter (card backgrounds)
  bg_muted: "#1c2333"           # Tags, code blocks, chips
  border: "#30363d"             # Borders, dividers

# --- Text (light to dim on dark) --------------------------
  text_bright: "#e6edf3"        # Headings, strongest emphasis
  text: "#c9d1d9"               # Primary body text
  text_secondary: "#8b949e"     # Descriptions, secondary
  text_soft: "#6e7681"          # Muted, subtle
  text_light: "#484f58"         # Dimmest, tertiary

# --- Accent (terminal green) ------------------------------
  accent: "#50fa7b"             # Links, buttons, prompts
  accent_hover: "#69ff97"       # Hover state (brighter green)

# --- Dark sections (nav, hero, footer) ----------------------
dark:
  bg: "#0d1117"                 # Same as main bg
  border: "#30363d"             # Consistent border
  overlay_faint: "rgba(80, 250, 123, 0.02)"
  overlay_subtle: "rgba(80, 250, 123, 0.04)"
  overlay_light: "rgba(80, 250, 123, 0.06)"
  overlay_medium: "rgba(80, 250, 123, 0.08)"

# --- Selection ---------------------------------------------
selection:
  bg: "rgba(80, 250, 123, 0.25)"

# --- Accent line -------------------------------------------
gradients:
  start: "#50fa7b"
  mid: "#8be9fd"
  end: "#bd93f9"

# --- Hero --------------------------------------------------
hero:
  glow_primary: "rgba(80, 250, 123, 0.08)"
  glow_secondary: "rgba(80, 250, 123, 0.04)"
  label_color: "#50fa7b"
  name_color: "#e6edf3"
  stat_color: "#50fa7b"
  primary_link_border: "#30363d"

# --- Hover / interaction tints ------------------------------
interactions:
  accent_tint: "rgba(80, 250, 123, 0.08)"
  accent_tint_strong: "rgba(80, 250, 123, 0.15)"
  accent_border: "rgba(80, 250, 123, 0.4)"
  accent_glow_sm: "0 0 8px rgba(80, 250, 123, 0.3)"
  accent_glow_md: "0 0 16px rgba(80, 250, 123, 0.2)"
  contact_primary_bg: "rgba(80, 250, 123, 0.08)"

# --- Category colours (Dracula palette) --------------------
categories:
  streaming: "#ff5555"           # Red
  batch: "#ffb86c"               # Orange
  lakehouse: "#50fa7b"           # Green
  quality: "#bd93f9"             # Purple
  devops: "#8be9fd"              # Cyan

category_glows:
  streaming: "0 2px 12px rgba(255, 85, 85, 0.25)"
  batch: "0 2px 12px rgba(255, 184, 108, 0.25)"
  lakehouse: "0 2px 12px rgba(80, 250, 123, 0.25)"
  quality: "0 2px 12px rgba(189, 147, 249, 0.25)"
  devops: "0 2px 12px rgba(139, 233, 253, 0.25)"

# --- Layout ------------------------------------------------
layout:
  radius: "4px"

# --- Shadows (dark + green glow) ---------------------------
shadows:
  sm: "0 1px 4px rgba(0, 0, 0, 0.4)"
  md: "0 4px 12px rgba(0, 0, 0, 0.5)"
  lg: "0 8px 24px rgba(0, 0, 0, 0.6)"
  glow: "0 0 12px rgba(80, 250, 123, 0.15)"

# --- Transitions -------------------------------------------
transitions:
  default: "0.2s ease"
  slow: "0.3s cubic-bezier(0.25, 0.1, 0.25, 1)"
