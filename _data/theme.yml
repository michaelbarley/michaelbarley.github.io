# ============================================================
# Theme Configuration — Apple-inspired
# Clean whites, subtle grays, blue accent
# Generous whitespace, large radii, minimal visual noise
# ============================================================

# --- Backgrounds -------------------------------------------
colors:
  bg: "#ffffff"                  # Page background
  bg_subtle: "#f5f5f7"          # Alternate sections
  bg_muted: "#f5f5f7"           # Tags, code, chips
  border: "#d2d2d7"             # Borders, dividers

# --- Text (dark to light) ----------------------------------
  text_bright: "#1d1d1f"        # Headings, strongest emphasis
  text: "#1d1d1f"               # Primary body text
  text_secondary: "#424245"     # Descriptions, secondary
  text_soft: "#6e6e73"          # Code blocks, subtle
  text_light: "#86868b"         # Muted, tertiary

# --- Accent (Apple blue) -----------------------------------
  accent: "#0071e3"             # Links, buttons, borders
  accent_hover: "#0077ED"       # Hover state

# --- Dark sections (nav, hero, footer) ----------------------
dark:
  bg: "#fbfbfd"                 # Nav & hero background
  border: "#d2d2d7"             # Borders in dark areas
  overlay_faint: "rgba(0, 0, 0, 0.02)"
  overlay_subtle: "rgba(0, 0, 0, 0.04)"
  overlay_light: "rgba(0, 0, 0, 0.06)"
  overlay_medium: "rgba(0, 0, 0, 0.08)"

# --- Selection ---------------------------------------------
selection:
  bg: "rgba(0, 113, 227, 0.15)"

# --- Accent line -------------------------------------------
gradients:
  start: "#0071e3"
  mid: "#0071e3"
  end: "#0071e3"

# --- Hero --------------------------------------------------
hero:
  glow_primary: "rgba(0, 113, 227, 0.04)"
  glow_secondary: "rgba(0, 113, 227, 0.02)"
  label_color: "#0071e3"
  name_color: "#1d1d1f"
  stat_color: "#1d1d1f"
  primary_link_border: "#d2d2d7"

# --- Hover / interaction tints ------------------------------
interactions:
  accent_tint: "rgba(0, 113, 227, 0.06)"
  accent_tint_strong: "rgba(0, 113, 227, 0.10)"
  accent_border: "rgba(0, 113, 227, 0.3)"
  accent_glow_sm: "0 0 0 transparent"
  accent_glow_md: "0 0 0 transparent"
  contact_primary_bg: "rgba(0, 113, 227, 0.04)"

# --- Category colours ---------------------------------------
categories:
  streaming: "#FF3B30"           # Red
  batch: "#FF9500"               # Orange
  lakehouse: "#34C759"           # Green
  quality: "#AF52DE"             # Purple
  devops: "#007AFF"              # Blue

category_glows:
  streaming: "0 2px 8px rgba(255, 59, 48, 0.10)"
  batch: "0 2px 8px rgba(255, 149, 0, 0.10)"
  lakehouse: "0 2px 8px rgba(52, 199, 89, 0.10)"
  quality: "0 2px 8px rgba(175, 82, 222, 0.10)"
  devops: "0 2px 8px rgba(0, 122, 255, 0.10)"

# --- Layout ------------------------------------------------
layout:
  radius: "12px"

# --- Shadows -----------------------------------------------
shadows:
  sm: "0 1px 3px rgba(0, 0, 0, 0.04)"
  md: "0 4px 12px rgba(0, 0, 0, 0.06)"
  lg: "0 8px 24px rgba(0, 0, 0, 0.08)"
  glow: "0 4px 12px rgba(0, 0, 0, 0.06)"

# --- Transitions -------------------------------------------
transitions:
  default: "0.2s ease"
  slow: "0.3s cubic-bezier(0.25, 0.1, 0.25, 1)"
